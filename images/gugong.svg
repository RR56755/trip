<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="gugongSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a237e"/><stop offset="100%" stop-color="#4a148c"/></linearGradient>
    <linearGradient id="gugongWall" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c62828"/><stop offset="100%" stop-color="#8e0000"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#gugongSky)"/>
  <circle cx="650" cy="80" r="40" fill="#fff9c4" opacity="0.9"/>
  <circle cx="650" cy="80" r="55" fill="#fff9c4" opacity="0.2"/>
  <!-- 城墙 -->
  <rect x="0" y="320" width="800" height="180" fill="url(#gugongWall)"/>
  <rect x="0" y="310" width="800" height="15" fill="#ffd54f"/>
  <!-- 太和殿 -->
  <rect x="250" y="200" width="100" height="120" fill="#c62828"/>
  <polygon points="250,200 300,150 350,200" fill="#ffd54f"/>
  <rect x="260" y="220" width="80" height="50" fill="#8e0000" rx="3"/>
  <rect x="265" y="275" width="70" height="8" fill="#ffd54f"/>
  <rect x="270" y="285" width="60" height="35" fill="#4e342e"/>
  <!-- 左右配殿 -->
  <rect x="120" y="250" width="80" height="70" fill="#c62828"/>
  <polygon points="120,250 160,210 200,250" fill="#ffd54f"/>
  <rect x="400" y="250" width="80" height="70" fill="#c62828"/>
  <polygon points="400,250 440,210 480,250" fill="#ffd54f"/>
  <!-- 柱子 -->
  <rect x="265" y="195" width="6" height="125" fill="#ffcc80"/>
  <rect x="285" y="195" width="6" height="125" fill="#ffcc80"/>
  <rect x="305" y="195" width="6" height="125" fill="#ffcc80"/>
  <rect x="325" y="195" width="6" height="125" fill="#ffcc80"/>
  <!-- 石阶 -->
  <rect x="260" y="320" width="80" height="8" fill="#9e9e9e"/>
  <rect x="255" y="328" width="90" height="6" fill="#757575"/>
  <rect x="248" y="334" width="104" height="6" fill="#616161"/>
  <!-- 地面 -->
  <rect x="0" y="340" width="800" height="160" fill="#4e342e"/>
  <rect x="50" y="345" width="700" height="4" fill="#795548"/>
  <rect x="50" y="355" width="700" height="4" fill="#795548"/>
  <!-- 标题 -->
  <text x="400" y="460" text-anchor="middle" fill="#ffd54f" font-size="22" font-weight="bold" font-family="sans-serif">故宫博物院</text>
  <text x="400" y="484" text-anchor="middle" fill="#ffcc80" font-size="12" font-family="sans-serif">The Palace Museum</text>
</svg>